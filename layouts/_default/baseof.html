<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="{{ .Site.Params.Description }}">
  <title>{{ .Site.Title }} ✦</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#8b5cf6">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">

  <!-- Prevent theme flash: apply saved theme before paint -->
  <script>(function(){var t=localStorage.getItem('au_theme')||'dark';document.documentElement.setAttribute('data-theme',t);document.documentElement.style.colorScheme=t;})()</script>

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- App CSS (minified) -->
  {{ $css := resources.Get "css/app.css" | resources.Minify }}
  <link rel="stylesheet" href="{{ $css.RelPermalink }}">

  <!-- Page-specific head extras (preload hints etc.) -->
  {{ block "head_extra" . }}{{ end }}
</head>
<body>
  {{ block "main" . }}{{ end }}

  <!-- GSAP (deferred — executes after HTML parsed, before DOMContentLoaded) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" defer></script>

  <!-- App JS (minified, deferred) -->
  {{ $js := resources.Get "js/app.js" | resources.Minify }}
  <script src="{{ $js.RelPermalink }}" defer></script>

  <!-- PWA Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
</body>
</html>
